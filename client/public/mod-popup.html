<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Moderation — survev.de</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080810;
      --surface:   #0f0f1e;
      --surface2:  #14142a;
      --surface3:  #1a1a34;
      --border:    #1e1e3a;
      --border2:   #2a2a4a;
      --text:      #c8c8e0;
      --text-dim:  #5a5a7a;
      --text-muted:#3a3a55;
      --blue:      #3355ee;
      --blue-glow: #3355ee55;
      --green:     #1a7a1a;
      --green-t:   #44cc44;
      --green-dim: #0a2a0a;
      --orange:    #aa4400;
      --orange-t:  #ff8833;
      --orange-dim:#2a1000;
      --red:       #aa1a1a;
      --red-t:     #ff4444;
      --red-dim:   #1e0808;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── Header ─────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 28px 16px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #0d0d22 0%, var(--bg) 100%);
      flex-shrink: 0;
    }

    #header-logo {
      width: 34px; height: 34px;
      border-radius: 8px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    #header-text { flex: 1; }
    #header-title {
      font-size: 15px;
      font-weight: 700;
      color: #e0e0f8;
      letter-spacing: 0.3px;
    }
    #header-sub {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 1px;
      font-weight: 400;
    }

    #conn-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-dim);
    }
    #conn-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--red-t);
      box-shadow: 0 0 6px var(--red-t);
      transition: all 0.4s;
    }
    #conn-dot.on { background: var(--green-t); box-shadow: 0 0 8px var(--green-t); }

    /* ─── Actions ────────────────────────────── */
    #actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .act-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 14px 8px;
      border-radius: 10px;
      border: 1px solid transparent;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.1s, filter 0.15s, border-color 0.15s;
      background: var(--surface);
    }
    .act-card:hover  { filter: brightness(1.2); transform: translateY(-1px); }
    .act-card:active { filter: brightness(0.85); transform: translateY(0); }
    .act-icon { font-size: 18px; line-height: 1; }
    .act-label { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; }

    #btn-verify   { border-color: #1e5c1e; color: var(--green-t);  background: var(--green-dim); }
    #btn-freeze   { border-color: #6a3500; color: var(--orange-t); background: var(--orange-dim); }
    #btn-unfreeze { border-color: #1e4a1e; color: var(--green-t);  background: var(--green-dim); }

    /* ─── Stats bar ──────────────────────────── */
    #statsbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 28px 6px;
      flex-shrink: 0;
    }
    #statsbar-label { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; color: var(--text-muted); }
    #player-count {
      font-size: 11px;
      color: var(--text-dim);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 12px;
    }

    /* ─── Player list ────────────────────────── */
    #list-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 0 28px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border2) transparent;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 4px;
    }

    thead th {
      padding: 6px 14px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      text-align: left;
      position: sticky; top: 0;
      background: var(--bg);
    }
    thead th:not(:first-child) { text-align: center; width: 72px; }

    tbody tr {
      background: var(--surface);
      transition: background 0.12s;
    }
    tbody tr:hover { background: var(--surface2); }

    td {
      padding: 11px 14px;
      vertical-align: middle;
    }
    td:first-child { border-radius: 8px 0 0 8px; }
    td:last-child  { border-radius: 0 8px 8px 0; }
    td:not(:first-child) { text-align: center; }

    .name-col {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .name-avatar {
      width: 28px; height: 28px;
      border-radius: 7px;
      background: var(--surface3);
      border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-dim);
      flex-shrink: 0;
      text-transform: uppercase;
    }
    .name-text { font-weight: 500; color: #d0d0ee; font-size: 13px; }
    .name-text.is-self { color: var(--text-dim); }
    .self-badge {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--blue);
      background: #1a1a3a;
      border: 1px solid #2a2a5a;
      border-radius: 4px;
      padding: 1px 5px;
    }

    .dead-badge {
      font-size: 9px; font-weight: 600; letter-spacing: 1px;
      color: #ff4466; background: #2a0a0a;
      border: 1px solid #5a1a1a; border-radius: 4px; padding: 1px 5px;
    }
    .spec-badge {
      font-size: 9px; font-weight: 600; letter-spacing: 1px;
      color: #44aaff; background: #0a1a2a;
      border: 1px solid #1a3a5a; border-radius: 4px; padding: 1px 5px;
    }
    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      color: var(--text-muted);
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 7px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      user-select: none;
    }
    .meta-chip:hover { color: var(--text-dim); border-color: var(--border2); }
    .meta-chip.copied { color: #4caf50 !important; border-color: #2a5a2a !important; }
    #copy-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e3a1e;
      border: 1px solid #2a5a2a;
      color: #4caf50;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      padding: 6px 16px;
      border-radius: 6px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 9999;
    }
    #copy-toast.show { opacity: 1; }
    .meta-chip-icon { font-size: 9px; opacity: 0.5; }

    .row-btn {
      border: none;
      color: #fff;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 10px;
      font-family: inherit;
      font-weight: 700;
      letter-spacing: 0.8px;
      transition: filter 0.12s, transform 0.1s;
      white-space: nowrap;
    }
    .row-btn:hover  { filter: brightness(1.3); transform: scale(1.04); }
    .row-btn:active { filter: brightness(0.85); transform: scale(0.97); }
    .kick { background: #7a1515; }
    .ban  { background: #4a0c0c; }
    .msg  { background: #102244; }

    .empty-row td {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: 1px;
      background: transparent;
    }
    .empty-row:hover td { background: transparent; }

    /* ─── Input sections ─────────────────────── */
    .input-section {
      display: none;
      flex-shrink: 0;
      margin: 8px 28px 20px;
      border-radius: 10px;
      overflow: hidden;
    }
    .input-section-inner {
      padding: 16px 18px;
      border: 1px solid var(--border2);
      border-radius: 10px;
    }
    #announce-section .input-section-inner { border-top: 2px solid var(--blue); background: #080820; }
    #ban-section      .input-section-inner { border-top: 2px solid var(--red-t); background: #0e0608; }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      margin-bottom: 10px;
    }
    .section-label span { font-weight: 600; font-size: 12px; }
    #announce-section .section-label span { color: #6699ff; }
    #ban-section      .section-label span { color: #ff6666; }

    .input-row { display: flex; gap: 8px; }

    .txt-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 9px 13px;
      border-radius: 7px;
      font-family: inherit;
      font-size: 13px;
      outline: none;
      min-width: 0;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #announce-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow); }
    #ban-reason-input:focus { border-color: var(--red-t); box-shadow: 0 0 0 3px #ff444433; }

    .submit-btn {
      border: none;
      color: #fff;
      padding: 9px 22px;
      border-radius: 7px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.8px;
      transition: filter 0.15s;
    }
    .submit-btn:hover { filter: brightness(1.15); }
    #announce-send { background: var(--blue); }
    #ban-confirm   { background: var(--red); }

    .cancel-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
      padding: 0 8px;
      transition: color 0.15s;
    }
    .cancel-btn:hover { color: var(--text-dim); }

    /* ─── Overlay ────────────────────────────── */
    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
      background: var(--bg);
      z-index: 100;
    }
    #overlay.hidden { display: none; }
    #overlay-gfx {
      width: 60px; height: 60px;
      border-radius: 16px;
      background: var(--surface);
      border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      opacity: 0.5;
    }
    #overlay-title { font-size: 15px; font-weight: 600; color: var(--text-dim); }
    #overlay-hint  { font-size: 12px; color: var(--text-muted); }
  </style>
</head>
<body>

<div id="copy-toast">Copied!</div>
<div id="overlay">
  <div id="overlay-gfx">⚡</div>
  <div id="overlay-title">Waiting for game…</div>
  <div id="overlay-hint">Keep the survev.de tab open</div>
</div>

<div id="header">
  <div id="header-logo">🛡️</div>
  <div id="header-text">
    <div id="header-title">Moderation Panel</div>
    <div id="header-sub">survev.de admin tools</div>
  </div>
  <div id="conn-badge">
    <div id="conn-dot"></div>
    <span id="conn-text">Offline</span>
  </div>
</div>

<div id="actions">
  <button class="act-card" id="btn-verify">
    <span class="act-icon">✓</span>
    <span class="act-label">VERIFY</span>
  </button>
  <button class="act-card" id="btn-freeze">
    <span class="act-icon">⛔</span>
    <span class="act-label">FREEZE</span>
  </button>
  <button class="act-card" id="btn-unfreeze">
    <span class="act-icon">▶</span>
    <span class="act-label">UNFREEZE</span>
  </button>
</div>

<div id="statsbar">
  <span id="statsbar-label">PLAYERS</span>
  <span id="player-count">—</span>
  <span id="game-id-badge" style="margin-left:auto;font-size:10px;color:var(--text-muted);font-family:monospace;letter-spacing:0.5px;"></span>
</div>

<div id="list-wrap">
  <table>
    <thead>
      <tr>
        <th>NAME</th>
        <th>KICK</th>
        <th>BAN</th>
        <th>MSG</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div id="announce-section" class="input-section">
  <div class="input-section-inner">
    <div class="section-label">ANNOUNCE TO <span id="announce-target-name"></span></div>
    <div class="input-row">
      <input id="announce-input" class="txt-input" type="text" maxlength="200" placeholder="Type your message…">
      <button id="announce-send" class="submit-btn">SEND</button>
      <button id="announce-cancel" class="cancel-btn">✕</button>
    </div>
  </div>
</div>

<div id="ban-section" class="input-section">
  <div class="input-section-inner">
    <div class="section-label">BAN PLAYER <span id="ban-target-name"></span></div>
    <div class="input-row" style="margin-bottom:8px">
      <input id="ban-reason-input" class="txt-input" type="text" maxlength="100" placeholder="Reason (optional)…">
    </div>
    <div class="input-row">
      <input id="ban-days-input" class="txt-input" type="number" min="1" max="9999" value="7" style="width:80px;flex:none;text-align:center;">
      <span style="display:flex;align-items:center;padding:0 6px;font-size:11px;color:var(--text-dim);white-space:nowrap">days</span>
      <button id="ban-confirm" class="submit-btn" style="margin-left:auto">BAN</button>
      <button id="ban-cancel" class="cancel-btn">✕</button>
    </div>
  </div>
</div>

<script>
  const ch = new BroadcastChannel("mod-panel");

  let announceTarget = null;
  let banTarget = null;

  const overlay    = document.getElementById("overlay");
  const connDot    = document.getElementById("conn-dot");
  const connText   = document.getElementById("conn-text");
  const countEl    = document.getElementById("player-count");
  const gameIdEl   = document.getElementById("game-id-badge");
  const tbody     = document.getElementById("tbody");
  const annSec    = document.getElementById("announce-section");
  const annInput  = document.getElementById("announce-input");
  const annNameEl = document.getElementById("announce-target-name");
  const banSec    = document.getElementById("ban-section");
  const banInput  = document.getElementById("ban-reason-input");
  const banDays   = document.getElementById("ban-days-input");
  const banNameEl = document.getElementById("ban-target-name");

  function setConnected(val) {
    connDot.classList.toggle("on", val);
    connText.textContent = val ? "Connected" : "Offline";
    overlay.classList.toggle("hidden", val);
  }

  function setGameId(id) {
    gameIdEl.textContent = id ? "GAME " + id.substring(0, 8).toUpperCase() : "";
  }

  function sendCmd(cmd) { ch.postMessage({ type: "cmd", cmd }); }

  /* ── Announce ── */
  function showAnnounce(name) {
    hideBan();
    announceTarget = name;
    annNameEl.textContent = name;
    annSec.style.display = "block";
    annInput.value = "";
    annInput.focus();
  }
  function hideAnnounce() {
    announceTarget = null;
    annSec.style.display = "none";
    annInput.value = "";
  }

  /* ── Ban ── */
  function showBan(name) {
    hideAnnounce();
    banTarget = name;
    banNameEl.textContent = name;
    banSec.style.display = "block";
    banInput.value = "";
    banDays.value = "7";
    banInput.focus();
  }
  function hideBan() {
    banTarget = null;
    banSec.style.display = "none";
    banInput.value = "";
    banDays.value = "7";
  }
  function confirmBan() {
    if (!banTarget) return;
    const reason = banInput.value.trim() || "banned_by_admin";
    const days = Math.max(1, parseInt(banDays.value) || 7);
    sendCmd(`/ban "${banTarget}" ${days} "${reason}"`);
    hideBan();
  }

  /* ── Render ── */
  function avatarChar(name) { return (name || "?")[0].toUpperCase(); }

  const copyToast = document.getElementById("copy-toast");
  let toastTimer = null;
  function showCopyToast() {
    copyToast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => copyToast.classList.remove("show"), 1200);
  }
  function copyToClipboard(text) {
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(showCopyToast).catch(() => { fallbackCopy(text); showCopyToast(); });
    } else {
      fallbackCopy(text);
      showCopyToast();
    }
  }
  function fallbackCopy(text) {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.cssText = "position:fixed;top:-9999px;left:-9999px;opacity:0";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try { document.execCommand("copy"); } catch {}
    document.body.removeChild(ta);
  }

  function mkBtn(text, cls, fn) {
    const b = document.createElement("button");
    b.className = "row-btn " + cls;
    b.textContent = text;
    b.onclick = fn;
    return b;
  }

  function renderPlayers(players) {
    countEl.textContent = players.length;
    tbody.innerHTML = "";

    if (players.length === 0) {
      const tr = document.createElement("tr");
      tr.className = "empty-row";
      const td = document.createElement("td");
      td.colSpan = 4;
      td.textContent = "NO PLAYERS IN GAME";
      tr.appendChild(td);
      tbody.appendChild(tr);
      return;
    }

    players.forEach(p => {
      const tr = document.createElement("tr");

      /* Name cell */
      const nameTd = document.createElement("td");
      const nameDiv = document.createElement("div");
      nameDiv.className = "name-col";

      const avatar = document.createElement("div");
      avatar.className = "name-avatar";
      avatar.textContent = avatarChar(p.name);

      const nameText = document.createElement("span");
      nameText.className = "name-text" + (p.isSelf ? " is-self" : "");
      nameText.textContent = p.name;

      nameDiv.appendChild(avatar);
      nameDiv.appendChild(nameText);

      if (p.isSelf) {
        const badge = document.createElement("span");
        badge.className = "self-badge";
        badge.textContent = "YOU";
        nameDiv.appendChild(badge);
      }
      if (p.dead) {
        const badge = document.createElement("span");
        badge.className = "dead-badge";
        badge.textContent = "DEAD";
        nameDiv.appendChild(badge);
      }
      if (p.spectator) {
        const badge = document.createElement("span");
        badge.className = "spec-badge";
        badge.textContent = "SPEC";
        nameDiv.appendChild(badge);
      }

      function chip(icon, val) {
        if (!val) return;
        const c = document.createElement("span");
        c.className = "meta-chip";
        c.title = "Click to copy";
        c.onclick = () => {
          copyToClipboard(val);
          c.classList.add("copied");
          setTimeout(() => c.classList.remove("copied"), 1000);
        };
        const ic = document.createElement("span");
        ic.className = "meta-chip-icon";
        ic.textContent = icon;
        c.appendChild(ic);
        c.appendChild(document.createTextNode(val));
        nameDiv.appendChild(c);
      }
      chip("🌐", p.encodedIp);
      chip("👤", p.slug);
      chip("💬", p.discordId);

      nameTd.appendChild(nameDiv);
      tr.appendChild(nameTd);

      /* Action cells */
      const kickTd = document.createElement("td");
      const banTd  = document.createElement("td");
      const msgTd  = document.createElement("td");

      if (!p.isSelf) {
        kickTd.appendChild(mkBtn("KICK", "kick", () => {
          if (confirm("Kick " + p.name + "?")) sendCmd(`/kick "${p.name}" kicked_by_admin`);
        }));
        banTd.appendChild(mkBtn("BAN", "ban", () => showBan(p.name)));
      }
      msgTd.appendChild(mkBtn("MSG", "msg", () => showAnnounce(p.name)));

      tr.appendChild(kickTd);
      tr.appendChild(banTd);
      tr.appendChild(msgTd);
      tbody.appendChild(tr);
    });
  }

  /* ── Buttons ── */
  document.getElementById("btn-verify").onclick   = () => { if (confirm("Verify lobby? Unverified players will be kicked.")) sendCmd("/verify"); };
  document.getElementById("btn-freeze").onclick   = () => sendCmd("/freeze");
  document.getElementById("btn-unfreeze").onclick = () => sendCmd("/unfreeze");

  document.getElementById("announce-send").onclick   = () => { const t = annInput.value.trim(); if (t && announceTarget) { sendCmd(`/announce_player "${announceTarget}" "${t}"`); hideAnnounce(); } };
  document.getElementById("announce-cancel").onclick = hideAnnounce;
  annInput.addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("announce-send").click(); if (e.key === "Escape") hideAnnounce(); });

  document.getElementById("ban-confirm").onclick  = confirmBan;
  document.getElementById("ban-cancel").onclick   = hideBan;
  banInput.addEventListener("keydown", e => { if (e.key === "Enter") confirmBan(); if (e.key === "Escape") hideBan(); });

  /* ── Channel ── */
  ch.onmessage = e => {
    const msg = e.data;
    if (msg.type === "sync")   { setConnected(true);  renderPlayers(msg.players); }
    if (msg.type === "closed") { setConnected(false); }
  };

  function ping() { ch.postMessage({ type: "requestSync" }); }
  ping();
  setInterval(ping, 3000);
</script>
</body>
</html>
